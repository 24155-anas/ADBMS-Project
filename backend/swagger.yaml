openapi: 3.0.3
info:
  title: RideShare API
  description: REST API for a ride-sharing platform — Phase 2
  version: 2.0.0
  contact:
    name: RideShare Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local dev server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    User:
      type: object
      properties:
        user_id: { type: integer }
        email: { type: string }
        phone: { type: string }
        full_name: { type: string }
        profile_pic: { type: string, nullable: true }
        is_active: { type: boolean }
        roles: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }

    Vehicle:
      type: object
      properties:
        vehicle_id: { type: integer }
        licence_plate: { type: string }
        model: { type: string }
        seats: { type: integer }
        hourly_rate: { type: number }
        is_available: { type: boolean }
        vehicle_type: { type: string, enum: [Sedan,SUV,Bike,Van] }

    RentalBooking:
      type: object
      properties:
        rental_id: { type: integer }
        customer_id: { type: integer }
        vehicle_id: { type: integer }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        total_amount: { type: number }
        status: { type: string, enum: [pending,active,completed,cancelled] }

    RideBooking:
      type: object
      properties:
        ride_id: { type: integer }
        customer_id: { type: integer }
        driver_id: { type: integer }
        vehicle_id: { type: integer }
        pickup_location: { type: string }
        dropoff_location: { type: string }
        fare: { type: number }
        status: { type: string, enum: [pending,active,completed,cancelled] }

    CarpoolOffer:
      type: object
      properties:
        carpool_id: { type: integer }
        driver_id: { type: integer }
        vehicle_id: { type: integer }
        origin: { type: string }
        destination: { type: string }
        departure_time: { type: string, format: date-time }
        available_seats: { type: integer }
        price_per_seat: { type: number }
        status: { type: string, enum: [open,full,completed,cancelled] }

    Review:
      type: object
      properties:
        review_id: { type: integer }
        reviewer_id: { type: integer }
        reviewee_id: { type: integer, nullable: true }
        vehicle_id: { type: integer, nullable: true }
        booking_type: { type: string, enum: [rental,ride,carpool] }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }

paths:
  # ── AUTH ──
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email,password,phone,full_name]
              properties:
                email: { type: string, example: "test@example.com" }
                password: { type: string, example: "secret123" }
                phone: { type: string, example: "+923001234599" }
                full_name: { type: string, example: "Test User" }
                role: { type: string, enum: [customer,driver], default: customer }
      responses:
        201: { description: Registration successful }
        409: { description: Duplicate email/phone }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email,password]
              properties:
                email: { type: string, example: "ahmed.khan@gmail.com" }
                password: { type: string, example: "password123" }
      responses:
        200: { description: Login successful — returns token }
        401: { description: Invalid credentials }

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get own profile
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: User profile }
    put:
      tags: [Auth]
      summary: Update own profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
                profile_pic: { type: string }
      responses:
        200: { description: Profile updated }

  /auth/change-password:
    put:
      tags: [Auth]
      summary: Change password
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password,new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string }
      responses:
        200: { description: Password changed }

  # ── USERS (admin) ──
  /users:
    get:
      tags: [Users]
      summary: List all users (admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: role, in: query, schema: { type: string } }
        - { name: is_active, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        200: { description: Paginated user list }

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: User details }
        404: { description: Not found }
    put:
      tags: [Users]
      summary: Update user (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
                is_active: { type: boolean }
      responses:
        200: { description: Updated }
    delete:
      tags: [Users]
      summary: Deactivate user (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Deactivated }

  /users/{id}/role:
    put:
      tags: [Users]
      summary: Assign role (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role_name: { type: string, enum: [customer,driver,admin] }
      responses:
        200: { description: Role assigned }
    delete:
      tags: [Users]
      summary: Remove role (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role_name: { type: string }
      responses:
        200: { description: Role removed }

  # ── VEHICLES ──
  /vehicles:
    get:
      tags: [Vehicles]
      summary: List vehicles (public)
      parameters:
        - { name: vehicle_type, in: query, schema: { type: string } }
        - { name: is_available, in: query, schema: { type: string } }
      responses:
        200: { description: Vehicle list }
    post:
      tags: [Vehicles]
      summary: Create vehicle (admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [licence_plate,model,seats,hourly_rate,vehicle_type]
              properties:
                licence_plate: { type: string, example: "NEW-0001" }
                model: { type: string, example: "Toyota Camry 2025" }
                seats: { type: integer, example: 5 }
                hourly_rate: { type: number, example: 2000 }
                vehicle_type: { type: string, enum: [Sedan,SUV,Bike,Van] }
      responses:
        201: { description: Created }

  /vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Get vehicle details (public)
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Vehicle details }
    put:
      tags: [Vehicles]
      summary: Update vehicle (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Updated }
    delete:
      tags: [Vehicles]
      summary: Delete vehicle (admin — fails if active bookings)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Deleted }
        409: { description: Active bookings exist }

  /vehicles/{id}/reviews:
    get:
      tags: [Vehicles]
      summary: Vehicle reviews & stats (public)
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Reviews and stats }

  # ── RENTALS ──
  /rentals:
    get:
      tags: [Rentals]
      summary: List rentals (own or all for admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string } }
      responses:
        200: { description: Rental list }
    post:
      tags: [Rentals]
      summary: Create rental (customer — transactional)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id,start_date,end_date]
              properties:
                vehicle_id: { type: integer, example: 1 }
                start_date: { type: string, format: date, example: "2026-04-01" }
                end_date: { type: string, format: date, example: "2026-04-03" }
                payment_method: { type: string, enum: [card,cash], default: card }
      responses:
        201: { description: Rental + payment created }
        409: { description: Vehicle unavailable or dates overlap }

  /rentals/active:
    get:
      tags: [Rentals]
      summary: Active rentals (admin — DB view)
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Active rental list }

  /rentals/{id}:
    get:
      tags: [Rentals]
      summary: Get rental details
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Rental details }
    delete:
      tags: [Rentals]
      summary: Cancel pending rental
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Cancelled }

  /rentals/{id}/status:
    put:
      tags: [Rentals]
      summary: Update rental status (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending,active,completed,cancelled] }
      responses:
        200: { description: Status updated }

  # ── RIDES ──
  /rides:
    get:
      tags: [Rides]
      summary: List rides
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Ride list }
    post:
      tags: [Rides]
      summary: Book a ride (customer — transactional)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [driver_id,vehicle_id,pickup_location,dropoff_location,fare]
              properties:
                driver_id: { type: integer, example: 3 }
                vehicle_id: { type: integer, example: 1 }
                pickup_location: { type: string, example: "Gulberg III, Lahore" }
                dropoff_location: { type: string, example: "DHA Phase 5, Lahore" }
                fare: { type: number, example: 500 }
                payment_method: { type: string, enum: [card,cash], default: cash }
      responses:
        201: { description: Ride + payment created }

  /rides/{id}:
    get:
      tags: [Rides]
      summary: Get ride details
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Ride details }

  /rides/{id}/complete:
    put:
      tags: [Rides]
      summary: Complete ride (driver)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Ride completed }

  /rides/{id}/cancel:
    put:
      tags: [Rides]
      summary: Cancel ride
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Ride cancelled }

  # ── CARPOOLS ──
  /carpools/offers:
    get:
      tags: [Carpools]
      summary: List carpool offers
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: origin, in: query, schema: { type: string } }
        - { name: destination, in: query, schema: { type: string } }
      responses:
        200: { description: Offer list }
    post:
      tags: [Carpools]
      summary: Create carpool offer (driver)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id,origin,destination,departure_time,available_seats,price_per_seat]
              properties:
                vehicle_id: { type: integer }
                origin: { type: string }
                destination: { type: string }
                departure_time: { type: string, format: date-time }
                available_seats: { type: integer }
                price_per_seat: { type: number }
      responses:
        201: { description: Offer created }

  /carpools/offers/{id}:
    get:
      tags: [Carpools]
      summary: Get offer with bookings
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Offer + bookings }
    put:
      tags: [Carpools]
      summary: Update own offer (driver)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Updated }

  /carpools/bookings:
    get:
      tags: [Carpools]
      summary: List carpool bookings
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Booking list }
    post:
      tags: [Carpools]
      summary: Book carpool seats (customer — transactional)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [carpool_id,seats_booked]
              properties:
                carpool_id: { type: integer, example: 7 }
                seats_booked: { type: integer, example: 1 }
                payment_method: { type: string, enum: [card,cash] }
      responses:
        201: { description: Booking + payment created }
        409: { description: Not enough seats or already booked }

  /carpools/bookings/{id}/cancel:
    put:
      tags: [Carpools]
      summary: Cancel booking (customer)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Cancelled }

  # ── PAYMENTS ──
  /payments/rentals:
    get:
      tags: [Payments]
      summary: Rental payments
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Payment list }

  /payments/rides:
    get:
      tags: [Payments]
      summary: Ride payments
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Payment list }

  /payments/carpools:
    get:
      tags: [Payments]
      summary: Carpool payments
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Payment list }

  /payments/summary:
    get:
      tags: [Payments]
      summary: Payment summary (admin)
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Aggregate stats }

  /payments/rentals/{id}/status:
    put:
      tags: [Payments]
      summary: Update rental payment status (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_status: { type: string, enum: [pending,completed,failed,refunded] }
      responses:
        200: { description: Updated }

  /payments/rides/{id}/status:
    put:
      tags: [Payments]
      summary: Update ride payment status (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Updated }

  /payments/carpools/{id}/status:
    put:
      tags: [Payments]
      summary: Update carpool payment status (admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Updated }

  # ── REVIEWS ──
  /reviews:
    get:
      tags: [Reviews]
      summary: List reviews (public)
      parameters:
        - { name: booking_type, in: query, schema: { type: string } }
        - { name: vehicle_id, in: query, schema: { type: integer } }
      responses:
        200: { description: Review list }
    post:
      tags: [Reviews]
      summary: Create review (customer)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_type,rating]
              properties:
                reviewee_id: { type: integer, nullable: true }
                vehicle_id: { type: integer, nullable: true }
                booking_type: { type: string, enum: [rental,ride,carpool] }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        201: { description: Created }

  /reviews/vehicle-stats:
    get:
      tags: [Reviews]
      summary: Vehicle review statistics (DB view)
      responses:
        200: { description: Stats }

  /reviews/driver-earnings:
    get:
      tags: [Reviews]
      summary: Driver earnings (admin — DB view)
      security: [{ BearerAuth: [] }]
      responses:
        200: { description: Earnings }

  /reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review by ID
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Review }
    delete:
      tags: [Reviews]
      summary: Delete review (owner or admin)
      security: [{ BearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        200: { description: Deleted }

  # ── HEALTH ──
  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        200: { description: OK }
